{% extends 'base.html' %}
{% block title %}Login — CryptoMetal{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-glyph">◈</span>
      <h1 class="logo-title">CryptoMetal</h1>
      <p class="logo-sub">Exchange Simulator</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <p class="auth-switch">No account? <a href="{{ url_for('register') }}">Create one</a></p>
  </div>
</div>
{% endblock %}
