{% extends 'base.html' %}
{% block title %}Transfer{% endblock %}
{% block content %}
<div class="page-header">
  <h2 class="page-title">↗ Transfer Assets</h2>
</div>

<div class="trade-card max-500">
  <div class="balance-grid">
    <div class="bal-item"><span>₹ Rupees</span><strong>₹{{ "%.2f"|format(user.rupees) }}</strong></div>
    <div class="bal-item"><span>BTC</span><strong>{{ "%.6f"|format(user.bitcoin) }}</strong></div>
    <div class="bal-item"><span>Gold</span><strong>{{ "%.4f"|format(user.gold) }}g</strong></div>
    <div class="bal-item"><span>Silver</span><strong>{{ "%.4f"|format(user.silver) }}g</strong></div>
  </div>

  <form method="POST">
    <div class="form-group">
      <label>Recipient Username</label>
      <input type="text" name="recipient" placeholder="Enter username" required>
    </div>
    <div class="form-group">
      <label>Asset</label>
      <select name="asset" class="form-select">
        <option value="rupees">₹ Rupees</option>
        <option value="bitcoin">₿ Bitcoin</option>
        <option value="gold">🥇 Gold (grams)</option>
        <option value="silver">🥈 Silver (grams)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Amount</label>
      <input type="number" name="amount" step="0.000001" min="0.000001" placeholder="Amount" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Send Transfer</button>
  </form>
</div>
{% endblock %}
