{% extends 'base.html' %}
{% block title %}Register — CryptoMetal{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-glyph">◈</span>
      <h1 class="logo-title">CryptoMetal</h1>
      <p class="logo-sub">Create Account</p>
    </div>
    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="3–20 characters" required minlength="3" maxlength="20">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Choose a password" required>
      </div>
      <div class="starter-info">
        <span>🎁 You'll start with <strong>₹100</strong></span>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
